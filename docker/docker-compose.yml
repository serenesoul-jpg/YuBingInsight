services:
  postgres:
    image: postgres:16-alpine
    container_name: yubing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yubing
      POSTGRES_PASSWORD: yubing
      POSTGRES_DB: yubing_insight
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yubing -d yubing_insight']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yubing-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
